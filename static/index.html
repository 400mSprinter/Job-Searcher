<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Search Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222536;
      --border: #2e3148;
      --text: #e2e8f0;
      --text-dim: #6b7280;
      --accent: #6366f1;
      --accent-hover: #4f52d6;
      --danger: #ef4444;
      --success: #22c55e;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 14px;
    }

    /* Header */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    header h1 { font-size: 18px; font-weight: 700; color: var(--text); }
    header h1 span { color: var(--accent); }

    /* Buttons */
    button {
      cursor: pointer;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      transition: background 0.15s;
    }
    .btn-primary { background: var(--accent); color: #fff; padding: 8px 16px; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .btn-ghost { background: transparent; color: var(--text-dim); padding: 4px 8px; }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 7px 14px; }
    .btn-outline:hover { background: var(--surface2); }

    /* Main layout */
    main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

    /* Filters */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter-pill {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-pill:hover { border-color: var(--accent); color: var(--text); }
    .filter-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .filter-count { margin-left: 4px; opacity: 0.7; }

    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--surface2); }
    th {
      padding: 10px 14px;
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      white-space: nowrap;
      user-select: none;
    }
    th.sortable { cursor: pointer; }
    th.sortable:hover { color: var(--text); }
    th .sort-arrow { margin-left: 4px; opacity: 0.4; }
    th.sorted .sort-arrow { opacity: 1; color: var(--accent); }
    td { padding: 10px 14px; border-top: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: var(--surface2); }
    .col-actions { width: 90px; }
    .col-id { width: 48px; color: var(--text-dim); }
    .col-url a { color: var(--accent); text-decoration: none; font-size: 12px; }
    .col-url a:hover { text-decoration: underline; }
    .col-notes { max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-dim); font-size: 12px; }
    .empty-row td { text-align: center; padding: 40px; color: var(--text-dim); }

    /* Status badges */
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-Applied    { background: #1d3461; color: #93c5fd; }
    .badge-Phone      { background: #3b2200; color: #fcd34d; }
    .badge-Interview  { background: #0c2d3a; color: #67e8f9; }
    .badge-Offer      { background: #052e16; color: #4ade80; font-weight: 700; }
    .badge-Rejected   { background: #2d0a0a; color: #f87171; }
    .badge-Withdrawn  { background: #1f1f1f; color: #9ca3af; }
    .badge-Ghosted    { background: #1f1212; color: #b45454; }

    /* Bottom panels */
    .panels {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 900px) { .panels { grid-template-columns: 1fr; } }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .panel-header h2 { font-size: 14px; font-weight: 600; }

    /* Reminders */
    .reminder-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 8px;
    }
    .reminder-card:last-child { margin-bottom: 0; }
    .reminder-company { font-weight: 600; font-size: 13px; }
    .reminder-role { color: var(--text-dim); font-size: 12px; margin-bottom: 4px; }
    .reminder-reason { color: #f59e0b; font-size: 12px; }
    .no-reminders { color: var(--success); font-size: 13px; text-align: center; padding: 20px 0; }


    /* Job Discovery */
    .gh-company-chip {
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .gh-company-chip:hover { border-color: var(--accent); color: var(--text); }
    .gh-company-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .gh-job-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .gh-job-card:last-child { margin-bottom: 0; }
    .gh-job-title { font-weight: 600; font-size: 13px; margin-bottom: 3px; }
    .gh-job-meta { color: var(--text-dim); font-size: 12px; }
    .gh-job-meta span { margin-right: 10px; }
    .gh-no-results { color: var(--text-dim); font-size: 13px; text-align: center; padding: 20px 0; }
    .gh-loading { color: var(--text-dim); font-size: 13px; padding: 10px 0; }

    /* Modal */
    dialog {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0;
      color: var(--text);
      width: 480px;
      max-width: 95vw;
    }
    dialog::backdrop { background: rgba(0,0,0,0.7); }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px 14px;
      border-bottom: 1px solid var(--border);
    }
    .modal-header h3 { font-size: 15px; font-weight: 600; }
    .modal-body { padding: 18px 20px; display: grid; gap: 14px; }
    .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }

    label { display: block; font-size: 12px; color: var(--text-dim); margin-bottom: 4px; }
    input, select, textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px 10px;
      font-size: 13px;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    select option { background: var(--surface2); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>Job <span>Search</span> Dashboard</h1>
  <button class="btn-primary" onclick="openAddModal()">+ Add Application</button>
</header>

<main>
  <!-- Filters -->
  <div class="filters" id="filters">
    <button class="filter-pill active" data-status="" onclick="setFilter(this, '')">All</button>
    <button class="filter-pill" data-status="Applied" onclick="setFilter(this, 'Applied')">Applied</button>
    <button class="filter-pill" data-status="Phone Screen" onclick="setFilter(this, 'Phone Screen')">Phone Screen</button>
    <button class="filter-pill" data-status="Interview" onclick="setFilter(this, 'Interview')">Interview</button>
    <button class="filter-pill" data-status="Offer" onclick="setFilter(this, 'Offer')">Offer</button>
    <button class="filter-pill" data-status="Rejected" onclick="setFilter(this, 'Rejected')">Rejected</button>
    <button class="filter-pill" data-status="Withdrawn" onclick="setFilter(this, 'Withdrawn')">Withdrawn</button>
    <button class="filter-pill" data-status="Ghosted" onclick="setFilter(this, 'Ghosted')">Ghosted</button>
  </div>

  <!-- Applications table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-id">#</th>
          <th class="sortable" data-field="company" onclick="handleSort('company')">Company <span class="sort-arrow">↕</span></th>
          <th class="sortable" data-field="role" onclick="handleSort('role')">Role <span class="sort-arrow">↕</span></th>
          <th class="sortable" data-field="status" onclick="handleSort('status')">Status <span class="sort-arrow">↕</span></th>
          <th class="sortable" data-field="date_applied" onclick="handleSort('date_applied')">Applied <span class="sort-arrow">↕</span></th>
          <th>Follow-up</th>
          <th>URL</th>
          <th>Notes</th>
          <th class="col-actions">Actions</th>
        </tr>
      </thead>
      <tbody id="apps-tbody">
        <tr class="empty-row"><td colspan="9">Loading...</td></tr>
      </tbody>
    </table>
  </div>

  <!-- Reminders -->
  <div class="panel">
    <div class="panel-header">
      <h2>Follow-up Reminders</h2>
      <button class="btn-ghost btn-sm" onclick="loadReminders()">Refresh</button>
    </div>
    <div id="reminders-list"><p class="no-reminders">Loading...</p></div>
  </div>

  <!-- Job Discovery -->
  <div class="panel" style="margin-top:20px">
    <div class="panel-header">
      <h2>Job Discovery <span style="font-size:11px;color:var(--text-dim);font-weight:400">via Greenhouse</span></h2>
    </div>

    <!-- Company chips -->
    <div id="gh-companies" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px"></div>

    <!-- Custom token input -->
    <div style="display:flex;gap:8px;margin-bottom:16px">
      <input type="text" id="gh-custom" placeholder="Custom board token (e.g. stripe)" style="max-width:220px" />
      <button class="btn-outline btn-sm" onclick="searchGreenhouse(document.getElementById('gh-custom').value.trim())">Search</button>
    </div>

    <!-- Results -->
    <div id="gh-results"></div>
  </div>
</main>

<!-- Add/Edit Modal -->
<dialog id="app-modal">
  <div class="modal-header">
    <h3 id="modal-title">Add Application</h3>
    <button class="btn-ghost" onclick="document.getElementById('app-modal').close()">✕</button>
  </div>
  <div class="modal-body">
    <input type="hidden" id="modal-id" />
    <div class="form-row">
      <div>
        <label>Company *</label>
        <input type="text" id="f-company" required />
      </div>
      <div>
        <label>Role / Title *</label>
        <input type="text" id="f-role" required />
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>Status</label>
        <select id="f-status"></select>
      </div>
      <div>
        <label>Date Applied</label>
        <input type="date" id="f-date_applied" />
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>Contact</label>
        <input type="text" id="f-contact" placeholder="Name / email" />
      </div>
      <div>
        <label>Follow-up Date</label>
        <input type="date" id="f-follow_up_date" />
      </div>
    </div>
    <div>
      <label>Job URL</label>
      <input type="url" id="f-url" placeholder="https://..." />
    </div>
    <div>
      <label>Notes</label>
      <textarea id="f-notes" rows="3"></textarea>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn-outline" onclick="document.getElementById('app-modal').close()">Cancel</button>
    <button class="btn-primary" onclick="submitForm()">Save</button>
  </div>
</dialog>

<script>
  const STATE = {
    apps: [],
    sortField: 'date_applied',
    sortDir: 'desc',
    filterStatus: '',
  };

  const STATUSES = [];


  // --- Status helpers ---
  async function loadStatuses() {
    const res = await fetch('/api/statuses');
    const data = await res.json();
    STATUSES.push(...data);
    const sel = document.getElementById('f-status');
    STATUSES.forEach(s => {
      const opt = document.createElement('option');
      opt.value = opt.textContent = s;
      sel.appendChild(opt);
    });
  }

  function badgeClass(status) {
    const map = {
      'Applied': 'Applied',
      'Phone Screen': 'Phone',
      'Interview': 'Interview',
      'Offer': 'Offer',
      'Rejected': 'Rejected',
      'Withdrawn': 'Withdrawn',
      'Ghosted': 'Ghosted',
    };
    return 'badge badge-' + (map[status] || 'Applied');
  }

  // --- Load apps ---
  async function loadApps() {
    const url = STATE.filterStatus
      ? `/api/applications?status=${encodeURIComponent(STATE.filterStatus)}`
      : '/api/applications';
    const res = await fetch(url);
    STATE.apps = await res.json();
    renderTable();
  }

  // --- Render table ---
  function renderTable() {
    const sorted = [...STATE.apps].sort((a, b) => {
      const va = (a[STATE.sortField] || '').toString().toLowerCase();
      const vb = (b[STATE.sortField] || '').toString().toLowerCase();
      return STATE.sortDir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
    });

    // Update sort arrows
    document.querySelectorAll('th.sortable').forEach(th => {
      const field = th.dataset.field;
      th.classList.toggle('sorted', field === STATE.sortField);
      const arrow = th.querySelector('.sort-arrow');
      if (field === STATE.sortField) {
        arrow.textContent = STATE.sortDir === 'asc' ? '↑' : '↓';
      } else {
        arrow.textContent = '↕';
      }
    });

    const tbody = document.getElementById('apps-tbody');
    if (sorted.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="9">No applications found.</td></tr>';
      return;
    }

    tbody.innerHTML = sorted.map(app => `
      <tr>
        <td class="col-id">${app.id}</td>
        <td><strong>${esc(app.company)}</strong></td>
        <td>${esc(app.role)}</td>
        <td><span class="${badgeClass(app.status)}">${esc(app.status)}</span></td>
        <td>${app.date_applied || '—'}</td>
        <td>${app.follow_up_date || '—'}</td>
        <td class="col-url">${app.url ? `<a href="${esc(app.url)}" target="_blank" rel="noopener">Link</a>` : '—'}</td>
        <td class="col-notes" title="${esc(app.notes || '')}">${esc((app.notes || '').slice(0, 60))}</td>
        <td class="col-actions">
          <button class="btn-ghost btn-sm" onclick="openEditModal(${app.id})">Edit</button>
          <button class="btn-ghost btn-sm" style="color:var(--danger)" onclick="confirmDelete(${app.id})">Del</button>
        </td>
      </tr>
    `).join('');
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // --- Sort ---
  function handleSort(field) {
    if (STATE.sortField === field) {
      STATE.sortDir = STATE.sortDir === 'asc' ? 'desc' : 'asc';
    } else {
      STATE.sortField = field;
      STATE.sortDir = 'asc';
    }
    renderTable();
  }

  // --- Filter ---
  function setFilter(btn, status) {
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    STATE.filterStatus = status;
    loadApps();
  }

  // --- Reminders ---
  async function loadReminders() {
    const res = await fetch('/api/reminders');
    const items = await res.json();
    const container = document.getElementById('reminders-list');

    if (items.length === 0) {
      container.innerHTML = '<p class="no-reminders">No follow-ups needed right now.</p>';
      return;
    }

    container.innerHTML = items.map(({ application: a, reason }) => `
      <div class="reminder-card">
        <div class="reminder-company">${esc(a.company)} — ${esc(a.role)}</div>
        <div class="reminder-role"><span class="${badgeClass(a.status)}">${esc(a.status)}</span></div>
        <div class="reminder-reason">${esc(reason)}</div>
      </div>
    `).join('');
  }

  // --- Modal ---
  function openAddModal() {
    const modal = document.getElementById('app-modal');
    document.getElementById('modal-title').textContent = 'Add Application';
    document.getElementById('modal-id').value = '';
    ['company','role','contact','url','notes'].forEach(f => document.getElementById('f-'+f).value = '');
    document.getElementById('f-status').value = 'Applied';
    document.getElementById('f-date_applied').value = new Date().toISOString().slice(0,10);
    document.getElementById('f-follow_up_date').value = '';
    modal.showModal();
  }

  async function openEditModal(id) {
    const res = await fetch(`/api/applications/${id}`);
    const app = await res.json();
    document.getElementById('modal-title').textContent = 'Edit Application';
    document.getElementById('modal-id').value = app.id;
    document.getElementById('f-company').value = app.company || '';
    document.getElementById('f-role').value = app.role || '';
    document.getElementById('f-status').value = app.status || 'Applied';
    document.getElementById('f-date_applied').value = app.date_applied || '';
    document.getElementById('f-follow_up_date').value = app.follow_up_date || '';
    document.getElementById('f-contact').value = app.contact || '';
    document.getElementById('f-url').value = app.url || '';
    document.getElementById('f-notes').value = app.notes || '';
    document.getElementById('app-modal').showModal();
  }

  async function submitForm() {
    const id = document.getElementById('modal-id').value;
    const data = {
      company: document.getElementById('f-company').value.trim(),
      role: document.getElementById('f-role').value.trim(),
      status: document.getElementById('f-status').value,
      date_applied: document.getElementById('f-date_applied').value || null,
      follow_up_date: document.getElementById('f-follow_up_date').value || null,
      contact: document.getElementById('f-contact').value.trim() || null,
      url: document.getElementById('f-url').value.trim() || null,
      notes: document.getElementById('f-notes').value.trim() || null,
    };

    if (!data.company || !data.role) {
      alert('Company and Role are required.');
      return;
    }

    if (id) {
      await fetch(`/api/applications/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
    } else {
      await fetch('/api/applications', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
    }

    document.getElementById('app-modal').close();
    await Promise.all([loadApps(), loadReminders()]);
  }

  async function confirmDelete(id) {
    if (!confirm('Delete this application?')) return;
    await fetch(`/api/applications/${id}`, { method: 'DELETE' });
    await Promise.all([loadApps(), loadReminders()]);
  }

  // --- Greenhouse Job Discovery ---
  let ghActiveToken = null;

  async function loadGreenhouseCompanies() {
    const res = await fetch('/api/greenhouse/companies');
    const companies = await res.json();
    const container = document.getElementById('gh-companies');
    container.innerHTML = companies.map(c => `
      <button class="gh-company-chip" data-token="${esc(c.token)}" onclick="searchGreenhouse('${esc(c.token)}')">${esc(c.name)}</button>
    `).join('');
  }

  async function searchGreenhouse(token) {
    if (!token) return;
    ghActiveToken = token;

    // Update active chip
    document.querySelectorAll('.gh-company-chip').forEach(c => {
      c.classList.toggle('active', c.dataset.token === token);
    });

    const results = document.getElementById('gh-results');
    results.innerHTML = '<p class="gh-loading">Fetching jobs...</p>';

    const res = await fetch(`/api/greenhouse/${encodeURIComponent(token)}`);
    if (!res.ok) {
      const err = await res.json();
      results.innerHTML = `<p class="gh-no-results">${esc(err.detail || 'No board found.')}</p>`;
      return;
    }

    const jobs = await res.json();
    if (jobs.length === 0) {
      results.innerHTML = '<p class="gh-no-results">No open roles found.</p>';
      return;
    }

    const companyName = document.querySelector(`.gh-company-chip[data-token="${token}"]`)?.textContent
      || token.charAt(0).toUpperCase() + token.slice(1);

    results.innerHTML = `<div style="color:var(--text-dim);font-size:12px;margin-bottom:10px">${jobs.length} open role(s)</div>` +
      jobs.map(j => `
        <div class="gh-job-card">
          <div style="flex:1">
            <div class="gh-job-title">${esc(j.title)}</div>
            <div class="gh-job-meta">
              <span>📍 ${esc(j.location || '—')}</span>
              ${j.departments.length ? `<span>🏢 ${esc(j.departments[0])}</span>` : ''}
              ${j.updated_at ? `<span>🗓 ${esc(j.updated_at)}</span>` : ''}
            </div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0;align-items:center">
            ${j.url ? `<a href="${esc(j.url)}" target="_blank" rel="noopener" class="btn-ghost btn-sm" style="text-decoration:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:12px;color:var(--accent)">View</a>` : ''}
            <button class="btn-primary btn-sm" onclick="addFromGreenhouse('${esc(companyName)}', '${esc(j.title)}', '${esc(j.url || '')}', '${esc(j.location || '')}')">+ Track</button>
          </div>
        </div>
      `).join('');
  }

  async function addFromGreenhouse(company, role, url, location) {
    const notes = location ? `Location: ${location}` : '';
    await fetch('/api/applications', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        company,
        role,
        status: 'Applied',
        date_applied: new Date().toISOString().slice(0, 10),
        url: url || null,
        notes: notes || null,
      }),
    });
    await loadApps();
    // Brief visual feedback
    event.target.textContent = '✓ Added';
    event.target.disabled = true;
    setTimeout(() => { event.target.textContent = '+ Track'; event.target.disabled = false; }, 2000);
  }

  // Init Greenhouse on load
  document.addEventListener('DOMContentLoaded', async () => {
    await loadStatuses();
    await Promise.all([loadApps(), loadReminders(), loadGreenhouseCompanies()]);
  });
</script>
</body>
</html>
